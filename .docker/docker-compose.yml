services:
  sdc-fwd-web:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: sdc-fwd-web
    hostname: sdc-fwd-web
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./ssh-keys/authorized_keys:/home/cadet/.ssh/authorized_keys:ro
    networks:
      fwd_net:
        ipv4_address: 172.31.0.11
    ports:
      - "2231:22"

  sdc-fwd-db:
    build:
      context: .
      dockerfile: Dockerfile.rocky
    container_name: sdc-fwd-db
    hostname: sdc-fwd-db
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./ssh-keys/authorized_keys:/home/cadet/.ssh/authorized_keys:ro
    networks:
      fwd_net:
        ipv4_address: 172.31.0.12
    ports:
      - "2232:22"

  sdc-fwd-comms:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: sdc-fwd-comms
    hostname: sdc-fwd-comms
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./ssh-keys/authorized_keys:/home/cadet/.ssh/authorized_keys:ro
    networks:
      fwd_net:
        ipv4_address: 172.31.0.13
    ports:
      - "2233:22"

networks:
  fwd_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
